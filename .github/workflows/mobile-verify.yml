name: Mobile Verify

on:
  push:
    branches: ["main"]
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - ".github/workflows/mobile-verify.yml"
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - ".github/workflows/mobile-verify.yml"
  workflow_dispatch:

jobs:
  mobile-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run mobile verify
        run: npm run verify
