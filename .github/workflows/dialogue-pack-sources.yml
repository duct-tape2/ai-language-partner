name: Dialogue Pack Sources

on:
  push:
    branches: ["main"]
    paths:
      - "packs/**"
      - "scripts/verify_dialogue_pack_sources.py"
      - ".github/workflows/dialogue-pack-sources.yml"
      - "apps/api/app/safety.py"
  pull_request:
    paths:
      - "packs/**"
      - "scripts/verify_dialogue_pack_sources.py"
      - ".github/workflows/dialogue-pack-sources.yml"
      - "apps/api/app/safety.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Validate dialogue-pack sources
        run: python scripts/verify_dialogue_pack_sources.py
