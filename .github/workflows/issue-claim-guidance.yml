name: Issue Claim Guidance

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  claim-guidance:
    runs-on: ubuntu-latest
    steps:
      - name: Post claim-to-PR guidance
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            if (!issue || !comment || issue.pull_request || comment.user.type === "Bot") {
              return;
            }

            const body = comment.body || "";
            const claimPattern =
              /(^|\n)\s*\/claim\b|(^|\n)\s*claim\b|\bi can work on this\b|\bi'll take this\b|\bcan i take this\b|제가\s*(해볼게요|하겠습니다|맡겠습니다)|작업해도\s*될까요|やります|担当します|取り組みます/i;
            if (!claimPattern.test(body)) {
              return;
            }

            const claimantMarker = `<!-- ai-language-partner:issue-claim-guidance:${comment.user.login} -->`;
            const { owner, repo } = context.repo;
            const claimLabel = "claimed";
            const existingLabels = Array.isArray(issue.labels) ? issue.labels : [];
            const alreadyClaimed = existingLabels.some((label) => label.name === claimLabel);
            if (!alreadyClaimed) {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issue.number,
                  labels: [claimLabel],
                });
                core.info(`Added ${claimLabel} label to #${issue.number}.`);
              } catch (error) {
                core.warning(`Could not add ${claimLabel} label to #${issue.number}: ${error.message}`);
              }
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: issue.number,
              per_page: 100,
            });
            if (comments.some((existing) => existing.body && existing.body.includes(claimantMarker))) {
              core.info("Issue claim guidance already exists for this claimant.");
              return;
            }

            const response = [
              claimantMarker,
              `Thanks, @${comment.user.login}. Treating this as a claim signal for #${issue.number}.`,
              "",
              "Quick context:",
              "",
              "- Hosted web demo: https://duct-tape2.github.io/ai-language-partner/demo/",
              alreadyClaimed
                ? "- Claim status: this issue already had the `claimed` label before your comment. Maintainers may split the scope or redirect you to a nearby unclaimed issue."
                : "- Claim status: maintainers use the `claimed` label and funnel monitor to avoid duplicate work.",
              "",
              "Fast path to a first PR:",
              "",
              "1. Use the directory first PR fast lane if you came from an external listing: https://duct-tape2.github.io/ai-language-partner/community/DIRECTORY_FIRST_PR.html",
              "2. Use the first issue matcher if you want a shorter menu: https://duct-tape2.github.io/ai-language-partner/community/FIRST_ISSUE_MATCHER.html",
              "3. Use the five-minute first PR guide for the browser-edit flow: https://duct-tape2.github.io/ai-language-partner/community/FIVE_MINUTE_FIRST_PR.html",
              "4. Use the no-install board if you want a direct GitHub web-editor task: https://duct-tape2.github.io/ai-language-partner/community/NO_INSTALL_FIRST_PRS.html",
              "5. Use Codespaces if you want tests without local setup: https://duct-tape2.github.io/ai-language-partner/community/CODESPACES_FIRST_PR.html",
              "6. For Japanese/Korean/content review, use the language review first PR kit: https://duct-tape2.github.io/ai-language-partner/community/LANGUAGE_REVIEW_FIRST_PR_KIT.html",
              "7. Keep the change focused on this issue.",
              `8. In the PR body, write \`Closes #${issue.number}\` or \`Refs #${issue.number}\`.`,
              "9. Mention the check you ran, or say it was docs/content/language review only.",
              "",
              "Guardrails:",
              "",
              "- Do not add generated audio, archives, SQLite files, screenshots, local engine folders, secrets, private notes, or API keys.",
              "- Preserve the no-runtime-LLM rule for the Daily Talk path.",
              "- If two people claim the same issue, maintainers will help split or redirect the work.",
              "- If this issue was already claimed, pick a backup from the matcher or no-install board so your first PR is not blocked.",
              "",
              "This comment is contributor guidance, not Claude for OSS evidence. Only useful merged PRs from real external contributors count.",
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: response,
            });
