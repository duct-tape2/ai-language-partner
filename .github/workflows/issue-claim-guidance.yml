name: Issue Claim Guidance

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

concurrency:
  group: issue-claim-${{ github.repository }}-${{ github.event.issue.number }}
  cancel-in-progress: false
  queue: max

jobs:
  claim-guidance:
    runs-on: ubuntu-latest
    steps:
      - name: Post claim-to-PR guidance
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            if (!issue || !comment || issue.pull_request || comment.user.type === "Bot") {
              return;
            }

            const body = comment.body || "";
            const renewPattern = /(^|\n)\s*\/renew\b/i;
            const claimPattern =
              /(^|\n)\s*\/claim\b|(^|\n)\s*claim\b|\bi can work on this\b|\bi'll take this\b|\bi(?:'d| would) like to (?:work on|take) this\b|\bcan i take this\b|\bi(?:'m|m| am) working (?:on )?(?:this|it)\b|\bcould you assign (?:it|this) to me\b|제가\s*(해볼게요|하겠습니다|맡겠습니다)|작업해도\s*될까요|やります|担当します|取り組みます/i;
            const isRenewal = renewPattern.test(body);
            if (!isRenewal && !claimPattern.test(body)) {
              return;
            }

            const eventMarker = `<!-- ai-language-partner:issue-claim-event:${comment.id} -->`;
            const claimantMarker = `<!-- ai-language-partner:issue-claim-guidance:${comment.user.login} -->`;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issue.number,
              per_page: 100,
            });
            if (
              comments.some(
                (existing) =>
                  existing.user?.login === "github-actions[bot]" &&
                  existing.body &&
                  existing.body.includes(eventMarker),
              )
            ) {
              core.info("This issue claim event was already handled.");
              return;
            }

            const { data: currentIssue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issue.number,
            });
            const claimLabel = "claimed";
            const leaseHours = 72;
            const availabilityLabels = ["help wanted", "up-for-grabs", "first-timers-only"];
            const existingLabels = Array.isArray(currentIssue.labels) ? currentIssue.labels : [];
            const existingAssignees = Array.isArray(currentIssue.assignees)
              ? currentIssue.assignees
              : [];
            const alreadyClaimed =
              existingLabels.some((label) => label.name === claimLabel) ||
              existingAssignees.length > 0;
            const claimantAlreadyAssigned = existingAssignees.some(
              (assignee) => assignee.login === comment.user.login,
            );
            const startedAt = new Date(comment.created_at || Date.now());
            const trustedBotLogin = "github-actions[bot]";
            const existingGuidance = comments.find(
              (existing) =>
                existing.user?.login === trustedBotLogin &&
                existing.body &&
                existing.body.includes(claimantMarker),
            );
            const activeLeases = comments
              .flatMap((existing, index) => {
                if (existing.user?.login !== trustedBotLogin || !existing.body) {
                  return [];
                }
                const matches = existing.body.matchAll(
                  /<!-- ai-language-partner:claim-lease:([^:>]+):([^>]+) -->/g,
                );
                return Array.from(matches, (match) => ({
                  login: match[1],
                  expiresAt: new Date(match[2]),
                  index,
                }));
              })
              .filter(
                (lease) =>
                  Number.isFinite(lease.expiresAt.getTime()) && lease.expiresAt > startedAt,
              )
              .sort(
                (left, right) =>
                  right.expiresAt.getTime() - left.expiresAt.getTime() || right.index - left.index,
              );
            const currentLeaseOwner = activeLeases[0]?.login || "";
            const expiresAt = new Date(startedAt.getTime() + leaseHours * 60 * 60 * 1000);
            const leaseMarker =
              `<!-- ai-language-partner:claim-lease:${comment.user.login}:${expiresAt.toISOString()} -->`;

            if (isRenewal) {
              const renewalAllowed =
                existingAssignees.length > 0
                  ? claimantAlreadyAssigned
                  : alreadyClaimed && currentLeaseOwner === comment.user.login;
              if (!renewalAllowed) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: [
                    eventMarker,
                    `@${comment.user.login}, this issue is not currently reserved for you, so the lease was not renewed.`,
                    "Choose an unassigned task from https://duct-tape2.github.io/ai-language-partner/community/STARTER_ISSUE_INDEX.html and comment `/claim` there.",
                  ].join("\n\n"),
                });
                return;
              }

              const renewalLine =
                `- Reservation check-in: renewed through ${expiresAt.toISOString()} (${leaseHours} hours). A linked open PR keeps the reservation active.`;
              if (existingGuidance) {
                let renewedBody = existingGuidance.body
                  .replace(/<!-- ai-language-partner:claim-lease:[^>]+ -->\n?/g, "")
                  .replace(/- Reservation check-in:[^\n]*/g, renewalLine);
                if (!renewedBody.includes(renewalLine)) {
                  renewedBody = `${renewedBody.trim()}\n\n${renewalLine}`;
                }
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existingGuidance.id,
                  body: `${leaseMarker}\n${renewedBody.trim()}\n${eventMarker}`,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: [
                    eventMarker,
                    claimantMarker,
                    leaseMarker,
                    `Thanks, @${comment.user.login}. Your reservation for #${issue.number} is renewed.`,
                    renewalLine,
                    `Open a focused PR with \`Closes #${issue.number}\` and name the check you ran.`,
                  ].join("\n\n"),
                });
              }
              return;
            }

            let claimLabelAdded = false;
            if (!alreadyClaimed) {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issue.number,
                  labels: [claimLabel],
                });
                claimLabelAdded = true;
                core.info(`Added ${claimLabel} label to #${issue.number}.`);
              } catch (error) {
                core.warning(`Could not add ${claimLabel} label to #${issue.number}: ${error.message}`);
              }
            }

            let assignmentAdded = claimantAlreadyAssigned;
            if (
              !alreadyClaimed &&
              claimLabelAdded &&
              existingAssignees.length === 0 &&
              !assignmentAdded
            ) {
              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: issue.number,
                  assignees: [comment.user.login],
                });
                assignmentAdded = true;
                core.info(`Assigned #${issue.number} to ${comment.user.login}.`);
              } catch (error) {
                core.warning(
                  `Could not assign #${issue.number} to ${comment.user.login}: ${error.message}`,
                );
              }
            }

            const claimRegistered = !alreadyClaimed && claimLabelAdded;
            const removedAvailabilityLabels = [];
            if (claimRegistered) {
              const existingLabelNames = new Set(existingLabels.map((label) => label.name));
              for (const label of availabilityLabels) {
                if (!existingLabelNames.has(label)) {
                  continue;
                }
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: issue.number,
                    name: label,
                  });
                  removedAvailabilityLabels.push(label);
                  core.info(`Removed availability label ${label} from claimed issue #${issue.number}.`);
                } catch (error) {
                  core.warning(`Could not remove ${label} from #${issue.number}: ${error.message}`);
                }
              }
            }

            let claimStatus;
            if (alreadyClaimed) {
              claimStatus =
                "- Claim status: this issue already had the `claimed` label or an assignee before your comment. Maintainers may split the scope or redirect you to a nearby unclaimed issue.";
            } else if (assignmentAdded && claimLabelAdded) {
              claimStatus =
                `- Claim status: assigned to @${comment.user.login} and marked with the \`claimed\` label.`;
            } else if (assignmentAdded) {
              claimStatus =
                `- Claim status: assigned to @${comment.user.login}; GitHub did not allow the workflow to add the \`claimed\` label.`;
            } else if (claimLabelAdded) {
              claimStatus =
                "- Claim status: marked with the `claimed` label. A maintainer will confirm assignment if GitHub did not allow automatic assignment.";
            } else {
              claimStatus =
                "- Claim status: GitHub did not allow automatic assignment or labeling. A maintainer must confirm before this issue is reserved.";
            }

            if (alreadyClaimed && existingGuidance) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingGuidance.id,
                body: `${existingGuidance.body}\n${eventMarker}`,
              });
              core.info("Issue claim guidance already exists for this claimant.");
              return;
            }

            const response = [
              eventMarker,
              claimantMarker,
              ...(claimRegistered ? [leaseMarker] : []),
              `Thanks, @${comment.user.login}. Treating this as a claim signal for #${issue.number}.`,
              "",
              claimStatus,
              ...(claimRegistered
                ? [
                    `- Reservation check-in: please reply with progress or \`/renew\` by ${expiresAt.toISOString()} (${leaseHours} hours). Maintainers review stale claims before releasing them; a linked open PR keeps the reservation active.`,
                    `- Availability labels removed while reserved: ${removedAvailabilityLabels.length ? removedAvailabilityLabels.map((label) => `\`${label}\``).join(", ") : "none"}.`,
                  ]
                : []),
              "",
              "Fast path:",
              "",
              "1. Follow the first-PR recipe already posted on this issue and keep the change focused.",
              "2. For a browser-only edit, use https://duct-tape2.github.io/ai-language-partner/community/FIVE_MINUTE_FIRST_PR.html",
              `3. In the PR body, write \`Closes #${issue.number}\` or \`Refs #${issue.number}\`.`,
              "4. Name the check you ran, or say it was docs/content/language review only.",
              "",
              "Need help? Ask at https://github.com/duct-tape2/ai-language-partner/discussions/53. If this issue was already claimed, pick a nearby unclaimed issue from https://duct-tape2.github.io/ai-language-partner/community/STARTER_ISSUE_INDEX.html.",
              "",
              "Do not add generated audio, archives, SQLite files, screenshots, local engines, secrets, or private notes. Only useful reviewed PRs from real contributors count.",
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: response,
            });
