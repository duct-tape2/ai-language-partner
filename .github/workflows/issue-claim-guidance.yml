name: Issue Claim Guidance

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

concurrency:
  group: issue-claim-${{ github.repository }}-${{ github.event.issue.number }}
  cancel-in-progress: false
  queue: max

jobs:
  claim-guidance:
    runs-on: ubuntu-latest
    steps:
      - name: Post claim-to-PR guidance
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            if (!issue || !comment || issue.pull_request || comment.user.type === "Bot") {
              return;
            }

            const body = comment.body || "";
            const claimPattern =
              /(^|\n)\s*\/claim\b|(^|\n)\s*claim\b|\bi can work on this\b|\bi'll take this\b|\bi(?:'d| would) like to (?:work on|take) this\b|\bcan i take this\b|\bi(?:'m|m| am) working (?:on )?(?:this|it)\b|\bcould you assign (?:it|this) to me\b|제가\s*(해볼게요|하겠습니다|맡겠습니다)|작업해도\s*될까요|やります|担当します|取り組みます/i;
            if (!claimPattern.test(body)) {
              return;
            }

            const eventMarker = `<!-- ai-language-partner:issue-claim-event:${comment.id} -->`;
            const claimantMarker = `<!-- ai-language-partner:issue-claim-guidance:${comment.user.login} -->`;
            const { owner, repo } = context.repo;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: issue.number,
              per_page: 100,
            });
            if (
              comments.some(
                (existing) =>
                  existing.user?.type === "Bot" &&
                  existing.body &&
                  existing.body.includes(eventMarker),
              )
            ) {
              core.info("This issue claim event was already handled.");
              return;
            }

            const { data: currentIssue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issue.number,
            });
            const claimLabel = "claimed";
            const leaseHours = 72;
            const availabilityLabels = ["help wanted", "up-for-grabs", "first-timers-only"];
            const existingLabels = Array.isArray(currentIssue.labels) ? currentIssue.labels : [];
            const existingAssignees = Array.isArray(currentIssue.assignees)
              ? currentIssue.assignees
              : [];
            const alreadyClaimed =
              existingLabels.some((label) => label.name === claimLabel) ||
              existingAssignees.length > 0;
            let claimLabelAdded = false;
            if (!alreadyClaimed) {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issue.number,
                  labels: [claimLabel],
                });
                claimLabelAdded = true;
                core.info(`Added ${claimLabel} label to #${issue.number}.`);
              } catch (error) {
                core.warning(`Could not add ${claimLabel} label to #${issue.number}: ${error.message}`);
              }
            }

            let assignmentAdded = existingAssignees.some(
              (assignee) => assignee.login === comment.user.login,
            );
            if (
              !alreadyClaimed &&
              claimLabelAdded &&
              existingAssignees.length === 0 &&
              !assignmentAdded
            ) {
              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: issue.number,
                  assignees: [comment.user.login],
                });
                assignmentAdded = true;
                core.info(`Assigned #${issue.number} to ${comment.user.login}.`);
              } catch (error) {
                core.warning(
                  `Could not assign #${issue.number} to ${comment.user.login}: ${error.message}`,
                );
              }
            }

            const claimRegistered = !alreadyClaimed && claimLabelAdded;
            const removedAvailabilityLabels = [];
            if (claimRegistered) {
              const existingLabelNames = new Set(existingLabels.map((label) => label.name));
              for (const label of availabilityLabels) {
                if (!existingLabelNames.has(label)) {
                  continue;
                }
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: issue.number,
                    name: label,
                  });
                  removedAvailabilityLabels.push(label);
                  core.info(`Removed availability label ${label} from claimed issue #${issue.number}.`);
                } catch (error) {
                  core.warning(`Could not remove ${label} from #${issue.number}: ${error.message}`);
                }
              }
            }

            const startedAt = new Date(comment.created_at || Date.now());
            const expiresAt = new Date(startedAt.getTime() + leaseHours * 60 * 60 * 1000);
            let claimStatus;
            if (alreadyClaimed) {
              claimStatus =
                "- Claim status: this issue already had the `claimed` label or an assignee before your comment. Maintainers may split the scope or redirect you to a nearby unclaimed issue.";
            } else if (assignmentAdded && claimLabelAdded) {
              claimStatus =
                `- Claim status: assigned to @${comment.user.login} and marked with the \`claimed\` label.`;
            } else if (assignmentAdded) {
              claimStatus =
                `- Claim status: assigned to @${comment.user.login}; GitHub did not allow the workflow to add the \`claimed\` label.`;
            } else if (claimLabelAdded) {
              claimStatus =
                "- Claim status: marked with the `claimed` label. A maintainer will confirm assignment if GitHub did not allow automatic assignment.";
            } else {
              claimStatus =
                "- Claim status: GitHub did not allow automatic assignment or labeling. A maintainer must confirm before this issue is reserved.";
            }

            const existingGuidance = comments.find(
              (existing) =>
                existing.user?.type === "Bot" &&
                existing.body &&
                existing.body.includes(claimantMarker),
            );
            if (alreadyClaimed && existingGuidance) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingGuidance.id,
                body: `${existingGuidance.body}\n${eventMarker}`,
              });
              core.info("Issue claim guidance already exists for this claimant.");
              return;
            }

            const response = [
              eventMarker,
              claimantMarker,
              `Thanks, @${comment.user.login}. Treating this as a claim signal for #${issue.number}.`,
              "",
              "Quick context:",
              "",
              "- Hosted web demo: https://duct-tape2.github.io/ai-language-partner/demo/",
              claimStatus,
              ...(claimRegistered
                ? [
                    `- Reservation check-in: please reply with progress or \`/renew\` by ${expiresAt.toISOString()} (${leaseHours} hours). Maintainers review stale claims before releasing them; a linked open PR keeps the reservation active.`,
                    `- Availability labels removed while reserved: ${removedAvailabilityLabels.length ? removedAvailabilityLabels.map((label) => `\`${label}\``).join(", ") : "none"}.`,
                  ]
                : []),
              "",
              "Fast path to a first PR:",
              "",
              "1. Use the directory first PR fast lane if you came from an external listing: https://duct-tape2.github.io/ai-language-partner/community/DIRECTORY_FIRST_PR.html",
              "2. Use the first issue matcher if you want a shorter menu: https://duct-tape2.github.io/ai-language-partner/community/FIRST_ISSUE_MATCHER.html",
              "3. Use the five-minute first PR guide for the browser-edit flow: https://duct-tape2.github.io/ai-language-partner/community/FIVE_MINUTE_FIRST_PR.html",
              "4. Use the no-install board if you want a direct GitHub web-editor task: https://duct-tape2.github.io/ai-language-partner/community/NO_INSTALL_FIRST_PRS.html",
              "5. Use Codespaces if you want tests without local setup: https://duct-tape2.github.io/ai-language-partner/community/CODESPACES_FIRST_PR.html",
              "6. For Japanese/Korean/content review, use the language review first PR kit: https://duct-tape2.github.io/ai-language-partner/community/LANGUAGE_REVIEW_FIRST_PR_KIT.html",
              "7. Keep the change focused on this issue.",
              `8. In the PR body, write \`Closes #${issue.number}\` or \`Refs #${issue.number}\`.`,
              "9. Mention the check you ran, or say it was docs/content/language review only.",
              "",
              "Guardrails:",
              "",
              "- Do not add generated audio, archives, SQLite files, screenshots, local engine folders, secrets, private notes, or API keys.",
              "- Preserve the no-runtime-LLM rule for the Daily Talk path.",
              "- If two people claim the same issue, maintainers will help split or redirect the work.",
              "- If this issue was already claimed, pick a backup from the matcher or no-install board so your first PR is not blocked.",
              "",
              "This comment is contributor guidance, not Claude for OSS evidence. Only useful merged PRs from real external contributors count.",
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: response,
            });
