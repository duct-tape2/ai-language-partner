name: No-Install First PR Guides

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "docs/community/NO_INSTALL_FIRST_PRS.md"
      - "scripts/post_no_install_first_pr_guides.py"
      - ".github/workflows/no-install-first-pr-guides.yml"
  pull_request:
    paths:
      - "docs/community/NO_INSTALL_FIRST_PRS.md"
      - "scripts/post_no_install_first_pr_guides.py"
      - ".github/workflows/no-install-first-pr-guides.yml"

permissions:
  contents: read
  issues: write

jobs:
  no-install-guides:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Render no-install guide comments
        run: |
          python scripts/post_no_install_first_pr_guides.py duct-tape2/ai-language-partner --date "$(date -u +%F)"

      - name: Post no-install guide comments
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/post_no_install_first_pr_guides.py duct-tape2/ai-language-partner --date "$(date -u +%F)" --apply --comment-login 'github-actions[bot]'

      - name: Write job summary
        run: cat docs/community/NO_INSTALL_FIRST_PR_COMMENTS.md >> "$GITHUB_STEP_SUMMARY"
