name: Issue Welcome

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Post issue guidance
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue || issue.pull_request || issue.user.type === "Bot") {
              return;
            }

            const body = [
              `Thanks for opening this, @${issue.user.login}.`,
              "",
              "Useful next steps:",
              "",
              "- Hosted web demo: https://duct-tape2.github.io/ai-language-partner/demo/",
              "- Contributor landing: https://duct-tape2.github.io/ai-language-partner/community/CONTRIBUTOR_LANDING.html",
              "- Directory first PR fast lane: https://duct-tape2.github.io/ai-language-partner/community/DIRECTORY_FIRST_PR.html",
              "- First issue matcher: https://duct-tape2.github.io/ai-language-partner/community/FIRST_ISSUE_MATCHER.html",
              "- Five-minute first PR: https://duct-tape2.github.io/ai-language-partner/community/FIVE_MINUTE_FIRST_PR.html",
              "- No-install first PR board: https://duct-tape2.github.io/ai-language-partner/community/NO_INSTALL_FIRST_PRS.html",
              "- Codespaces first PR guide: https://duct-tape2.github.io/ai-language-partner/community/CODESPACES_FIRST_PR.html",
              "- First PR walkthrough: https://duct-tape2.github.io/ai-language-partner/community/FIRST_PR_WALKTHROUGH.html",
              "- 20 contributor sprint kickoff: https://github.com/duct-tape2/ai-language-partner/issues/52",
              "",
              "For a first PR, please keep the change small and avoid generated audio, archives, SQLite files, local engine folders, secrets, or private notes.",
              "",
              "A maintainer will help scope this into a focused issue when needed."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body
            });
