name: Repo Hygiene

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  public-tree:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check public tree
        run: python scripts/check_public_tree.py

