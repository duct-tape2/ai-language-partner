name: Dependency Audit

on:
  pull_request:
    branches: ["main"]
    paths:
      - "apps/mobile/package.json"
      - "apps/mobile/package-lock.json"
      - "apps/api/requirements*.txt"
      - ".github/workflows/dependency-audit.yml"
  push:
    branches: ["main"]
    paths:
      - "apps/mobile/package.json"
      - "apps/mobile/package-lock.json"
      - "apps/api/requirements*.txt"
      - ".github/workflows/dependency-audit.yml"
  schedule:
    - cron: "11 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Reject moderate-or-higher npm vulnerabilities
        run: npm audit --audit-level=moderate

  python-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --disable-pip-version-check pip-audit==2.10.1

      - name: Audit production lock
        run: pip-audit -r apps/api/requirements-prod.txt --progress-spinner=off

      - name: Audit development lock
        run: pip-audit -r apps/api/requirements.txt --progress-spinner=off
