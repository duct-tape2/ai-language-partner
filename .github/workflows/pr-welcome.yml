name: PR Welcome

on:
  pull_request_target:
    types: [opened, ready_for_review]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Post contributor guidance
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr || pr.user.type === "Bot") {
              return;
            }

            const marker = "<!-- ai-language-partner:pr-welcome -->";
            const { owner, repo } = context.repo;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });
            if (comments.some((comment) => comment.body && comment.body.includes(marker))) {
              core.info("PR welcome comment already exists.");
              return;
            }

            const body = [
              marker,
              `Thanks for opening this PR, @${pr.user.login}.`,
              "",
              "A maintainer will review it against the public contribution rules:",
              "",
              "- Link the issue this PR closes or advances.",
              "  Example: `Closes #123` or `Refs #123` in the PR body.",
              "- Keep the change focused and reviewable.",
              "- Do not add generated audio, archives, SQLite files, local engine folders, or secrets.",
              "- Preserve the no-runtime-LLM rule for the Daily Talk path.",
              "- Mention the smallest relevant check you ran, or why the PR is docs/content-only.",
              "- The repo labels external PRs for maintainer review; that label is triage only, not evidence by itself.",
              "",
              "Useful links:",
              "",
              "- Hosted web demo: https://duct-tape2.github.io/ai-language-partner/demo/",
              "- Directory first PR fast lane: https://duct-tape2.github.io/ai-language-partner/community/DIRECTORY_FIRST_PR.html",
              "- First PR walkthrough: https://duct-tape2.github.io/ai-language-partner/community/FIRST_PR_WALKTHROUGH.html",
              "- Codespaces first PR guide: https://duct-tape2.github.io/ai-language-partner/community/CODESPACES_FIRST_PR.html",
              "- Contributor sprint lanes: https://duct-tape2.github.io/ai-language-partner/community/CONTRIBUTOR_SPRINT.html",
              "- Counting policy: https://duct-tape2.github.io/ai-language-partner/community/PR_REVIEW_AND_COUNTING_POLICY.html",
              "- Maintainer review runbook: https://duct-tape2.github.io/ai-language-partner/community/MAINTAINER_PR_REVIEW_RUNBOOK.html",
              "",
              "For Claude for OSS evidence, only real external contributors with useful merged PRs are counted. Maintainer-authored PRs, bots, duplicate identities, and trivial metric-only PRs are excluded."
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body
            });
