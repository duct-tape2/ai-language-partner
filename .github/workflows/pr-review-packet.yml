name: PR Review Packet

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  review-packet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Post maintainer review packet
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python scripts/post_pr_review_packet.py duct-tape2/ai-language-partner "$PR_NUMBER"
