name: Starter Issue Index

on:
  issues:
    types: [opened, edited, labeled, unlabeled, assigned, unassigned, closed, reopened]
  schedule:
    - cron: "30 9 * * 1"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/render_starter_issue_index.py"
      - "scripts/post_first_pr_recipes.py"
      - ".github/workflows/starter-issue-index.yml"

concurrency:
  group: starter-issue-index-${{ github.repository }}
  cancel-in-progress: true

permissions: read-all

jobs:
  refresh-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Render starter issue index
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/render_starter_issue_index.py duct-tape2/ai-language-partner --date "$(date -u +%F)"
          python scripts/post_first_pr_recipes.py duct-tape2/ai-language-partner --date "$(date -u +%F)"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- docs/community/STARTER_ISSUE_INDEX.md docs/community/FIRST_PR_RECIPES.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit refreshed docs to branch
        if: steps.diff.outputs.changed == 'true'
        id: branch
        run: |
          branch="automation/starter-issue-index"
          git checkout -b "$branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/community/STARTER_ISSUE_INDEX.md docs/community/FIRST_PR_RECIPES.md
          git commit -m "docs: refresh starter issue index"
          git push --force origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open refresh PR
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const branch = "${{ steps.branch.outputs.branch }}";
            const { owner, repo } = context.repo;
            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${branch}`,
            });
            if (existing.length > 0) {
              core.info(`Refresh PR already exists: ${existing[0].html_url}`);
              return;
            }
            try {
              const { data: pr } = await github.rest.pulls.create({
                owner,
                repo,
                title: "docs: refresh starter issue index",
                head: branch,
                base: "main",
                body: [
                  "Automated refresh for starter issue contributor docs.",
                  "",
                  "- `docs/community/STARTER_ISSUE_INDEX.md`",
                  "- `docs/community/FIRST_PR_RECIPES.md`",
                  "",
                  "This PR exists because `main` requires PR review for governance.",
                ].join("\n"),
              });
              core.info(`Created refresh PR: ${pr.html_url}`);
            } catch (error) {
              if (error.status === 403) {
                const compareUrl = `https://github.com/${owner}/${repo}/compare/main...${branch}?expand=1`;
                core.warning(`Could not create PR with GITHUB_TOKEN: ${error.message}`);
                core.warning(`Open the refresh PR manually if needed: ${compareUrl}`);
                return;
              }
              throw error;
            }
