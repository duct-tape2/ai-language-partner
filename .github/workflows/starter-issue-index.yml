name: Starter Issue Index

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened]
  schedule:
    - cron: "30 9 * * 1"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/render_starter_issue_index.py"
      - ".github/workflows/starter-issue-index.yml"

permissions:
  contents: write
  issues: read

jobs:
  refresh-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Render starter issue index
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/render_starter_issue_index.py duct-tape2/ai-language-partner --date "$(date -u +%F)"

      - name: Commit refreshed index
        run: |
          if git diff --quiet -- docs/community/STARTER_ISSUE_INDEX.md; then
            echo "Starter issue index is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/community/STARTER_ISSUE_INDEX.md
          git commit -m "docs: refresh starter issue index"
          git push
