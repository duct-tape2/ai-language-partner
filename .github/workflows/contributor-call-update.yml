name: Contributor Call Update

on:
  workflow_dispatch:
  schedule:
    - cron: "41 2 * * *"
  push:
    branches: [main]
    paths:
      - "docs/community/CALL_FOR_CONTRIBUTORS.md"
      - "docs/community/FIRST_ISSUE_MATCHER.md"
      - "docs/community/FIVE_MINUTE_FIRST_PR.md"
      - "docs/community/NO_INSTALL_FIRST_PRS.md"
      - "scripts/post_contributor_call_update.py"
      - ".github/workflows/contributor-call-update.yml"

permissions:
  contents: read

jobs:
  contributor-call-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted base branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Render contributor call status
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/post_contributor_call_update.py --repo duct-tape2/ai-language-partner
