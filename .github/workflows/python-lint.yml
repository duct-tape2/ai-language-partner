name: Python Lint

on:
  pull_request:
    paths:
      - "apps/api/**/*.py"
      - "apps/api/pyproject.toml"
      - "apps/api/requirements.in"
      - "apps/api/requirements.txt"
      - "scripts/**/*.py"
      - "ruff.toml"
      - ".github/workflows/python-lint.yml"
  push:
    branches: ["main"]
    paths:
      - "apps/api/**/*.py"
      - "apps/api/pyproject.toml"
      - "apps/api/requirements.in"
      - "apps/api/requirements.txt"
      - "scripts/**/*.py"
      - "ruff.toml"
      - ".github/workflows/python-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install locked development dependencies
        run: python -m pip install --require-hashes -r apps/api/requirements.txt

      - name: Lint Python
        run: python -m ruff check apps/api/app apps/api/tests apps/api/scripts scripts
