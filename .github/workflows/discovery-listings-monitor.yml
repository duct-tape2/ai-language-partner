name: Discovery Listings Monitor

on:
  schedule:
    - cron: "20 9 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/snapshot_discovery_listings.py"
      - ".github/workflows/discovery-listings-monitor.yml"
  pull_request:
    paths:
      - "scripts/snapshot_discovery_listings.py"
      - ".github/workflows/discovery-listings-monitor.yml"

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  discovery-listings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Snapshot discovery listings
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/snapshot_discovery_listings.py --out discovery-listings-status.md --comment

      - name: Write job summary
        run: cat discovery-listings-status.md >> "$GITHUB_STEP_SUMMARY"
