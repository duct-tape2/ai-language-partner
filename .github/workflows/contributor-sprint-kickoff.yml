name: Contributor Sprint Kickoff

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/create_contributor_sprint_kickoff_issue.py"
      - ".github/workflows/contributor-sprint-kickoff.yml"

permissions:
  contents: read
  issues: write

jobs:
  kickoff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Create kickoff issue
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/create_contributor_sprint_kickoff_issue.py duct-tape2/ai-language-partner
