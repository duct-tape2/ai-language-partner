name: Contributor Funnel Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "23 2 * * *"
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  contributor-funnel:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && (github.event_name != 'issue_comment' || !github.event.issue.pull_request)
    steps:
      - name: Checkout trusted base branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Update contributor funnel status
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/snapshot_contributor_funnel.py --repo duct-tape2/ai-language-partner --comment
