name: Language/content review
description: Review Japanese/Korean learner content, dialogue, or docs.
title: "content: "
labels: ["content", "language-review", "help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        For a first language-review PR, start with the review kit:
        https://github.com/duct-tape2/ai-language-partner/blob/main/docs/community/LANGUAGE_REVIEW_FIRST_PR_KIT.md

        It lists safe files, issue routes, and what not to change.
  - type: textarea
    id: scope
    attributes:
      label: Review scope
      description: Which pack, lesson, screen, or document needs review?
    validations:
      required: true
  - type: textarea
    id: criteria
    attributes:
      label: Review criteria
      value: |
        - Natural Japanese
        - Korean explanation clarity
        - Beginner-safe wording
        - No cultural stereotyping
        - No generated content without review notes
    validations:
      required: true
