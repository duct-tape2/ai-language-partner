name: Contributor interest or issue claim
description: Introduce yourself, pick a contribution lane, or claim a starter issue.
title: "community: contributor interest"
labels: ["community", "help wanted", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping `ai-language-partner`.

        You do not need local speech engines, generated audio, private data, or API keys for a useful first PR. The fastest browser-only route is here:
        https://github.com/duct-tape2/ai-language-partner/blob/main/docs/community/FIVE_MINUTE_FIRST_PR.md

        If you want a 30-second issue recommendation by skill/time, use:
        https://github.com/duct-tape2/ai-language-partner/blob/main/docs/community/FIRST_ISSUE_MATCHER.md

        Start with the contributor landing page if you are not sure which lane fits:
        https://duct-tape2.github.io/ai-language-partner/

        Korean contributor call:
        https://duct-tape2.github.io/ai-language-partner/community/CALL_FOR_CONTRIBUTORS_KO.html

        Korean five-minute first PR guide:
        https://github.com/duct-tape2/ai-language-partner/blob/main/docs/community/FIVE_MINUTE_FIRST_PR_KO.md

        Japanese contributor call:
        https://github.com/duct-tape2/ai-language-partner/blob/main/docs/community/CALL_FOR_CONTRIBUTORS_JA.md

        Japanese five-minute first PR guide:
        https://github.com/duct-tape2/ai-language-partner/blob/main/docs/community/FIVE_MINUTE_FIRST_PR_JA.md

        Language review first PR kit:
        https://github.com/duct-tape2/ai-language-partner/blob/main/docs/community/LANGUAGE_REVIEW_FIRST_PR_KIT.md

        After you submit this form, an automated triage comment will suggest lane-specific starter issues.
  - type: dropdown
    id: lane
    attributes:
      label: Contribution lane
      description: Pick the closest lane. It is fine if this changes later.
      options:
        - Korean docs or learner notes
        - Japanese naturalness review
        - Dialogue content review
        - Mobile accessibility
        - FastAPI/OpenAPI examples
        - Tests/tooling
        - Release/community process
        - Not sure yet
    validations:
      required: true
  - type: input
    id: issue
    attributes:
      label: Issue you want to work on
      description: Paste the issue URL or number if you have one.
      placeholder: "https://github.com/duct-tape2/ai-language-partner/issues/..."
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Tell maintainers what you can review or change.
      placeholder: "Example: I can review beginner Japanese naturalness and Korean explanations."
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Constraints
      description: Anything maintainers should know before suggesting an issue?
      value: |
        - [ ] I need a docs-only or content-review task.
        - [ ] I can run backend Python checks.
        - [ ] I can run mobile TypeScript checks.
        - [ ] I can review Korean/Japanese wording.
