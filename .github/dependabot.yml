version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/mobile
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - mobile
    groups:
      mobile-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "04:20"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - backend
    groups:
      api-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:40"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    labels:
      - dependencies
    groups:
      actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
