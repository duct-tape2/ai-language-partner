openapi: 3.0.3
info:
  title: AI Language Partner Mobile API
  version: 0.1.0
  description: Shared API contract for Claude frontend and Codex backend. Do not change without contract request.
servers:
  - url: http://localhost:8000
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  projectId: { type: string }
  /v1/personas:
    get:
      operationId: listPersonas
      responses:
        '200':
          description: personas
          content:
            application/json:
              schema:
                type: object
                properties:
                  personas:
                    type: array
                    items: { $ref: '#/components/schemas/Persona' }
  /v1/practice-rooms:
    get:
      operationId: listPracticeRooms
      responses:
        '200':
          description: practice rooms
          content:
            application/json:
              schema:
                type: object
                properties:
                  practiceRooms:
                    type: array
                    items: { $ref: '#/components/schemas/PracticeRoom' }
  /v1/practice-rooms/{practiceRoomId}:
    get:
      operationId: getPracticeRoom
      parameters:
        - in: path
          name: practiceRoomId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: practice room
          content:
            application/json:
              schema:
                type: object
                properties:
                  practiceRoom: { $ref: '#/components/schemas/PracticeRoom' }
  /v1/courses:
    get:
      operationId: listCourses
      responses:
        '200':
          description: courses
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items: { $ref: '#/components/schemas/Course' }
  /v1/courses/{courseId}:
    get:
      operationId: getCourse
      parameters:
        - in: path
          name: courseId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: course
          content:
            application/json:
              schema:
                type: object
                properties:
                  course: { $ref: '#/components/schemas/Course' }
  /v1/content/validate:
    post:
      operationId: validateContentBundle
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentBundleRequest' }
      responses:
        '200':
          description: content validation report
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  report: { $ref: '#/components/schemas/ContentQualityReport' }
  /v1/content/import:
    post:
      operationId: importContentBundle
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentImportRequest' }
      responses:
        '200':
          description: content import dry-run or applied result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  dryRun: { type: boolean }
                  applied: { type: boolean }
                  importedCounts:
                    type: object
                    properties:
                      courses: { type: integer }
                      practiceRooms: { type: integer }
                  version: { $ref: '#/components/schemas/ContentVersionSummary' }
                  report: { $ref: '#/components/schemas/ContentQualityReport' }
  /v1/content/quality-report:
    get:
      operationId: getContentQualityReport
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
      responses:
        '200':
          description: current stored content quality report
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  report: { $ref: '#/components/schemas/ContentQualityReport' }
  /v1/content/translation-memory:
    get:
      operationId: listTranslationMemory
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: query
          name: query
          required: false
          schema: { type: string }
        - in: query
          name: sourceLanguage
          required: false
          schema: { type: string, default: ko }
        - in: query
          name: targetLanguage
          required: false
          schema: { type: string, default: ja }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: translation memory entries for content QA and authoring
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items: { $ref: '#/components/schemas/TranslationMemoryEntry' }
    post:
      operationId: upsertTranslationMemory
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TranslationMemoryUpsertRequest' }
      responses:
        '200':
          description: translation memory upsert result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  upsertedCounts:
                    type: object
                    properties:
                      entries: { type: integer }
  /v1/content/translation-memory/suggest:
    post:
      operationId: suggestTranslationMemory
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TranslationMemorySuggestRequest' }
      responses:
        '200':
          description: ranked exact/fuzzy translation memory suggestions
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestions:
                    type: array
                    items: { $ref: '#/components/schemas/TranslationMemorySuggestion' }
  /v1/content/bulk-qa:
    post:
      operationId: runContentBulkQa
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentBulkQaRequest' }
      responses:
        '200':
          description: bulk QA report for current, versioned, or submitted content bundles
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  source: { type: string }
                  report: { $ref: '#/components/schemas/ContentBulkQaReport' }
  /v1/content/assignments:
    get:
      operationId: listContentAssignments
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: query
          name: status
          required: false
          schema: { type: string, enum: [todo, in_progress, blocked, done] }
        - in: query
          name: assignee
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: content workflow assignments
          content:
            application/json:
              schema:
                type: object
                properties:
                  assignments:
                    type: array
                    items: { $ref: '#/components/schemas/ContentAssignment' }
  /v1/content/assignments/{assignmentId}/status:
    post:
      operationId: updateContentAssignmentStatus
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: path
          name: assignmentId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentAssignmentStatusRequest' }
      responses:
        '200':
          description: updated content assignment status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  assignment: { $ref: '#/components/schemas/ContentAssignment' }
  /v1/content/versions:
    get:
      operationId: listContentVersions
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: saved content version snapshots
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items: { $ref: '#/components/schemas/ContentVersionSummary' }
  /v1/content/versions/{versionId}:
    get:
      operationId: getContentVersion
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: path
          name: versionId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: full content version snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { $ref: '#/components/schemas/ContentVersion' }
  /v1/content/versions/{versionId}/branch:
    post:
      operationId: branchContentVersion
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: path
          name: versionId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentBranchRequest' }
      responses:
        '200':
          description: branched content version and optional assignment
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  version: { $ref: '#/components/schemas/ContentVersion' }
                  assignment:
                    anyOf:
                      - $ref: '#/components/schemas/ContentAssignment'
                      - type: 'null'
  /v1/content/versions/{versionId}/assign:
    post:
      operationId: assignContentVersion
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: path
          name: versionId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentAssignmentRequest' }
      responses:
        '200':
          description: created or updated content assignment
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  assignment: { $ref: '#/components/schemas/ContentAssignment' }
  /v1/content/versions/{versionId}/submit-review:
    post:
      operationId: submitContentVersionReview
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: path
          name: versionId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentReviewRequest' }
      responses:
        '200':
          description: content version submitted for reviewer approval
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentVersionWorkflowResponse' }
  /v1/content/versions/{versionId}/approve:
    post:
      operationId: approveContentVersion
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: path
          name: versionId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentReviewRequest' }
      responses:
        '200':
          description: content version approved by a reviewer
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentVersionWorkflowResponse' }
  /v1/content/versions/{versionId}/reject:
    post:
      operationId: rejectContentVersion
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: path
          name: versionId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentReviewRequest' }
      responses:
        '200':
          description: content version rejected by a reviewer
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentVersionWorkflowResponse' }
  /v1/content/versions/{versionId}/publish:
    post:
      operationId: publishContentVersion
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: path
          name: versionId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: publish a saved content version snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  version: { $ref: '#/components/schemas/ContentVersion' }
                  importedCounts: { $ref: '#/components/schemas/ContentImportedCounts' }
                  report: { $ref: '#/components/schemas/ContentQualityReport' }
  /v1/content/operations/jobs:
    get:
      operationId: listContentOperationJobs
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: query
          name: status
          required: false
          schema: { type: string, enum: [queued, running, succeeded, failed, canceled] }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: queued and historical content operation jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items: { $ref: '#/components/schemas/ContentOperationJob' }
    post:
      operationId: createContentOperationJob
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentOperationJobRequest' }
      responses:
        '200':
          description: queued a content operation job
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  job: { $ref: '#/components/schemas/ContentOperationJob' }
  /v1/content/operations/jobs/run-next:
    post:
      operationId: runNextContentOperationJob
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentOperationJobRunNextRequest' }
      responses:
        '200':
          description: claimed and ran the next queued content operation job
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  job:
                    nullable: true
                    allOf:
                      - $ref: '#/components/schemas/ContentOperationJob'
                  result:
                    type: object
                    additionalProperties: true
                  error: { type: string, nullable: true }
  /v1/content/operations/jobs/{jobId}:
    get:
      operationId: getContentOperationJob
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: content operation job detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  job: { $ref: '#/components/schemas/ContentOperationJob' }
  /v1/content/operations/jobs/{jobId}/cancel:
    post:
      operationId: cancelContentOperationJob
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentOperationJobCancelRequest' }
      responses:
        '200':
          description: canceled a queued content operation job
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  job: { $ref: '#/components/schemas/ContentOperationJob' }
  /v1/content/scheduler/runs:
    get:
      operationId: listContentSchedulerRuns
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: query
          name: status
          required: false
          schema: { type: string, enum: [running, succeeded, failed] }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: managed content scheduler run history
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items: { $ref: '#/components/schemas/ContentSchedulerRun' }
  /v1/content/scheduler/run-once:
    post:
      operationId: runContentSchedulerOnce
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentSchedulerRunOnceRequest' }
      responses:
        '200':
          description: ran one managed content scheduler tick across due releases and queued operation jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  run: { $ref: '#/components/schemas/ContentSchedulerRun' }
                  releaseWorker:
                    type: object
                    additionalProperties: true
                  operationJobs:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
  /v1/content/releases:
    get:
      operationId: listContentReleases
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: query
          name: status
          required: false
          schema: { type: string, enum: [planned, scheduled, applied, rolled_back, canceled] }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: content release plans and release history
          content:
            application/json:
              schema:
                type: object
                properties:
                  releases:
                    type: array
                    items: { $ref: '#/components/schemas/ContentRelease' }
    post:
      operationId: createContentRelease
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentReleaseRequest' }
      responses:
        '200':
          description: planned content release with quality guardrail snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  release: { $ref: '#/components/schemas/ContentRelease' }
                  report: { $ref: '#/components/schemas/ContentQualityReport' }
  /v1/content/releases/{releaseId}/apply:
    post:
      operationId: applyContentRelease
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: path
          name: releaseId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentReleaseApplyRequest' }
      responses:
        '200':
          description: applied approved content release to the live catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  release: { $ref: '#/components/schemas/ContentRelease' }
                  version: { $ref: '#/components/schemas/ContentVersion' }
                  previousPublishedVersion:
                    nullable: true
                    allOf:
                      - $ref: '#/components/schemas/ContentVersion'
  /v1/content/releases/run-due:
    post:
      operationId: runDueContentReleases
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentReleaseRunDueRequest' }
      responses:
        '200':
          description: applied due scheduled/planned content releases for a release worker
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  ranAt: { type: string }
                  checkedCount: { type: integer }
                  appliedCount: { type: integer }
                  skippedCount: { type: integer }
                  appliedReleases:
                    type: array
                    items: { $ref: '#/components/schemas/ContentRelease' }
                  skipped:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
  /v1/content/releases/{releaseId}/rollback:
    post:
      operationId: rollbackContentRelease
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: path
          name: releaseId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentReleaseRollbackRequest' }
      responses:
        '200':
          description: rolled an applied content release back to the previous published version
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  release: { $ref: '#/components/schemas/ContentRelease' }
                  version: { $ref: '#/components/schemas/ContentVersion' }
  /v1/experiments:
    get:
      operationId: listExperiments
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
        - in: query
          name: status
          required: false
          schema: { type: string, enum: [draft, running, paused, archived] }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
      responses:
        '200':
          description: admin-visible experiment definitions
          content:
            application/json:
              schema:
                type: object
                properties:
                  experiments:
                    type: array
                    items: { $ref: '#/components/schemas/Experiment' }
    post:
      operationId: upsertExperiment
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminRoleHeader'
        - $ref: '#/components/parameters/AdminUserHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExperimentRequest' }
      responses:
        '200':
          description: created or updated experiment definition
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  experiment: { $ref: '#/components/schemas/Experiment' }
  /v1/experiments/assignments:
    get:
      operationId: listMyExperimentAssignments
      parameters:
        - $ref: '#/components/parameters/LearnerIdHeader'
        - in: query
          name: exposure
          required: false
          schema: { type: boolean, default: true }
      responses:
        '200':
          description: learner-stable assignments for all running experiments
          content:
            application/json:
              schema:
                type: object
                properties:
                  assignments:
                    type: array
                    items: { $ref: '#/components/schemas/ExperimentAssignment' }
                  exposureLogged: { type: boolean }
