        confirmation:
          type: string
          description: OIDC-linked accounts can be disabled with an active bearer session and confirmation value delete-my-account.
    AuthTrustDeviceRequest:
      type: object
      required: [confirmation]
      properties:
        confirmation:
          type: string
          enum: [trust-this-device]
          description: Explicit account-session confirmation to trust the currently bound device.
        deviceLabel: { type: string, maxLength: 120 }
        platform: { type: string, maxLength: 80 }
        attestationProvider:
          type: string
          maxLength: 80
          description: Provider hint such as self_attested, signed_challenge, public_key_challenge, webauthn_public_key, apple_app_attest, or android_play_integrity. signed_challenge verifies a server-issued one-time HMAC challenge when AI_LANGUAGE_PARTNER_DEVICE_ATTESTATION_SECRET is configured; public_key_challenge verifies an RS256 signature from a public RSA JWK; webauthn_public_key verifies a WebAuthn-style ES256 assertion from a P-256 public JWK, including challenge, origin, RP ID hash, user presence, authenticatorData, and clientDataJSON.
        attestationSubject:
          type: string
          maxLength: 2048
          description: Optional device-key subject or public JWK JSON; backend stores only a hash/thumbprint.
        evidence:
          type: object
          additionalProperties: true
          description: signed_challenge evidence requires challengeId, challenge, signature, and optional algorithm hmac-sha256. public_key_challenge evidence requires the same attestationSubject used when issuing the challenge, challengeId, challenge, RS256 signature, and either attestationSubject JWK JSON or evidence.publicKeyJwk. webauthn_public_key evidence requires challengeId, challenge, algorithm webauthn-es256, clientDataJSON, authenticatorData, and an ES256 signature over authenticatorData || SHA256(clientDataJSON).
    AuthDeviceAttestationChallengeRequest:
      type: object
      properties:
        attestationProvider:
          type: string
          maxLength: 80
          default: signed_challenge
        attestationSubject:
          type: string
          maxLength: 2048
    AuthDeviceAttestationChallengeResponse:
      type: object
      required: [challengeId, challenge, expiresAt, attestationProvider, attestationSubject, signatureAlgorithm, message]
      properties:
        challengeId: { type: string }
