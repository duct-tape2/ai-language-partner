        expiresAt: { type: string }
        attestationProvider: { type: string }
        attestationSubject: { type: string }
        signatureAlgorithm: { type: string, enum: [hmac-sha256, rs256, webauthn-es256] }
        message:
          type: string
          description: Canonical JSON string to sign with HMAC-SHA256 or RS256 depending on signatureAlgorithm. For webauthn-es256, clients bind this challenge through clientDataJSON and sign authenticatorData || SHA256(clientDataJSON).
