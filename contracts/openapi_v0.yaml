        authorizationUrl: { type: string }
        state:
          type: string
          description: One-time OAuth state. Backend stores only its SHA-256 hash.
        nonce: { type: string }
        redirectUri: { type: string }
        codeChallengeMethod: { type: string, enum: [S256] }
        expiresAt: { type: string }
