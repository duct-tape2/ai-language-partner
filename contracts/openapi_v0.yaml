components:
  parameters:
    LearnerIdHeader:
      in: header
      name: X-Learner-Id
      required: false
      schema: { type: string }
      description: Optional learner scope for local/dev mode. Hosted/token mode should use X-Learner-Token.
    LearnerTokenHeader:
      in: header
      name: X-Learner-Token
      required: false
      schema: { type: string }
      description: Expiring HMAC-signed learner token, format v2:{learnerId}:{expiresAtUnix}:{signature}.
    AdminKeyHeader:
      in: header
      name: X-Admin-Key
      required: true
      schema: { type: string }
      description: Admin key required for audit-log access.
    AdminRoleHeader:
      in: header
      name: X-Admin-Role
      required: false
      schema: { type: string, enum: [viewer, editor, reviewer, publisher, owner] }
      description: Optional admin role for content workflow gates. Missing role defaults to owner after a valid admin key.
    AdminUserHeader:
      in: header
      name: X-Admin-User
      required: false
      schema: { type: string }
      description: Optional admin actor label stored in content workflow audit metadata.
    AuthorizationHeader:
      in: header
      name: Authorization
      required: true
      schema: { type: string }
      description: Bearer account access token.
  schemas:
    Persona:
      type: object
      required: [id, displayName, role, voiceStyle]
      properties:
        id: { type: string }
        displayName: { type: string }
        japaneseName: { type: string }
        role: { type: string }
        voiceStyle: { type: string }
        teachingStyle: { type: string }
        avatarEmoji: { type: string }
        defaultLanguageMix:
          type: object
          properties:
            ko: { type: integer }
            ja: { type: integer }
    PracticeRoom:
      type: object
      required: [id, title, primaryPhraseKo, primaryPhraseJa, personaId]
      properties:
        id: { type: string }
        title: { type: string }
        primaryPhraseKo: { type: string }
        primaryPhraseJa: { type: string }
        alternativePhrasesJa:
          type: array
          items: { type: string }
        personaId: { type: string }
        scenario: { type: string }
        openingMessage: { type: string }
        courseId: { type: string }
        courseTitle: { type: string }
        unitId: { type: string }
        unitTitle: { type: string }
        unitOrder: { type: integer }
        lessonId: { type: string }
        lessonTitle: { type: string }
        lessonOrder: { type: integer }
        roomOrder: { type: integer }
        tags:
          type: array
          items: { type: string }
    Course:
      type: object
      required: [id, title, targetLanguage, nativeLanguage, level, units]
      properties:
        id: { type: string }
        title: { type: string }
        targetLanguage: { type: string }
        nativeLanguage: { type: string }
        level: { type: string }
        descriptionKo: { type: string }
        units:
          type: array
          items: { $ref: '#/components/schemas/CourseUnit' }
    CourseUnit:
      type: object
      required: [id, title, order, lessons]
      properties:
        id: { type: string }
        title: { type: string }
        order: { type: integer }
        skillTags:
          type: array
          items: { type: string }
        lessons:
          type: array
          items: { $ref: '#/components/schemas/CourseLesson' }
    CourseLesson:
      type: object
      required: [id, title, order, practiceRoomIds]
      properties:
        id: { type: string }
        title: { type: string }
        order: { type: integer }
        practiceRoomIds:
          type: array
          items: { type: string }
    ContentBundleRequest:
      type: object
      properties:
        courses:
          type: array
          items: { $ref: '#/components/schemas/Course' }
        practiceRooms:
          type: array
          items: { $ref: '#/components/schemas/PracticeRoom' }
    ContentImportRequest:
      allOf:
        - $ref: '#/components/schemas/ContentBundleRequest'
        - type: object
          properties:
            dryRun: { type: boolean, default: true }
            replaceExisting: { type: boolean, default: true }
    ContentImportedCounts:
      type: object
      properties:
        courses: { type: integer }
        practiceRooms: { type: integer }
    ContentSnapshotCounts:
      type: object
      properties:
        courses: { type: integer }
        practiceRooms: { type: integer }
    ContentVersionSummary:
      type: object
      required: [id, status, source, createdAt, importedCounts, report, snapshotCounts]
      properties:
        id: { type: string }
        label: { type: string, nullable: true }
        status: { type: string, enum: [draft, in_review, approved, rejected, published] }
        parentVersionId: { type: string, nullable: true }
        branchName: { type: string, nullable: true }
        source: { type: string }
        createdBy: { type: string, nullable: true }
        submittedBy: { type: string, nullable: true }
        reviewedBy: { type: string, nullable: true }
        reviewNote: { type: string, nullable: true }
        createdAt: { type: string }
        submittedAt: { type: string, nullable: true }
        reviewedAt: { type: string, nullable: true }
        publishedAt: { type: string, nullable: true }
        importedCounts: { $ref: '#/components/schemas/ContentImportedCounts' }
        report: { $ref: '#/components/schemas/ContentQualityReport' }
        snapshotCounts: { $ref: '#/components/schemas/ContentSnapshotCounts' }
    ContentReviewRequest:
      type: object
      properties:
        note: { type: string, nullable: true }
    ContentBranchRequest:
      type: object
      properties:
        label: { type: string, nullable: true }
        branchName: { type: string, nullable: true }
        assignee: { type: string, nullable: true }
        priority: { type: string, enum: [low, normal, high, urgent], default: normal }
        dueAt: { type: string, nullable: true }
        note: { type: string, nullable: true }
    ContentAssignmentRequest:
      type: object
      required: [assignee]
      properties:
        assignee: { type: string }
        priority: { type: string, enum: [low, normal, high, urgent], default: normal }
        dueAt: { type: string, nullable: true }
        note: { type: string, nullable: true }
        status: { type: string, enum: [todo, in_progress, blocked, done], default: todo }
    ContentAssignmentStatusRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [todo, in_progress, blocked, done] }
        note: { type: string, nullable: true }
    ContentAssignment:
      type: object
      required: [id, versionId, assignee, status, priority, createdAt, updatedAt]
      properties:
        id: { type: string }
        versionId: { type: string }
        versionStatus: { type: string }
        versionLabel: { type: string, nullable: true }
        parentVersionId: { type: string, nullable: true }
        branchName: { type: string, nullable: true }
        assignee: { type: string }
        status: { type: string, enum: [todo, in_progress, blocked, done] }
        priority: { type: string, enum: [low, normal, high, urgent] }
        note: { type: string, nullable: true }
        dueAt: { type: string, nullable: true }
        createdBy: { type: string, nullable: true }
        updatedBy: { type: string, nullable: true }
        createdAt: { type: string }
        updatedAt: { type: string }
        completedAt: { type: string, nullable: true }
